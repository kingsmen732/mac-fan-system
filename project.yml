name: MacFanWidgetApp
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  MacFanWidgetApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacFanWidgetApp/App
      - path: MacFanWidgetShared
    resources:
      - path: widget-sample.json
    info:
      path: MacFanWidgetApp/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bmithilesh.macfanwidget
        PRODUCT_NAME: Mac Fan Widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MacFanWidgetApp/App/Info.plist
        OTHER_CODE_SIGN_FLAGS: $(inherited) --identifier com.bmithilesh.macfanwidget
    postBuildScripts:
      - name: Bundle Privileged Fan Daemon
        script: |
          set -euo pipefail
          APP_ROOT="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH"
          DAEMON_DST="$APP_ROOT/Library/LaunchServices"
          PLIST_DST="$APP_ROOT/Library/LaunchDaemons"
          mkdir -p "$DAEMON_DST" "$PLIST_DST"
          cp "$BUILT_PRODUCTS_DIR/MacFanWidgetDaemon" "$DAEMON_DST/MacFanWidgetDaemon"
          chmod 755 "$DAEMON_DST/MacFanWidgetDaemon"
          cp "$SRCROOT/MacFanWidgetDaemon/LaunchDaemon/com.bmithilesh.macfanwidget.daemon.plist" "$PLIST_DST/com.bmithilesh.macfanwidget.daemon.plist"
    dependencies:
      - sdk: ServiceManagement.framework
      - target: MacFanWidgetDaemon
      - target: MacFanWidgetExtension
        embed: true

  MacFanWidgetDaemon:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacFanWidgetDaemon/Daemon
      - path: MacFanWidgetShared
      - path: native
        excludes:
          - smc_bridge.h
          - fan_bridge.h
    settings:
      base:
        PRODUCT_NAME: MacFanWidgetDaemon
        PRODUCT_BUNDLE_IDENTIFIER: com.bmithilesh.macfanwidget.daemon
        SWIFT_OBJC_BRIDGING_HEADER: MacFanWidgetDaemon/Daemon/MacFanWidgetDaemon-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/native
        OTHER_LDFLAGS: -lIOReport
        OTHER_CODE_SIGN_FLAGS: $(inherited) --identifier com.bmithilesh.macfanwidget.daemon
    dependencies:
      - sdk: IOKit.framework
      - sdk: CoreFoundation.framework

  MacFanWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: widget
        excludes:
          - README.md
      - path: MacFanWidgetShared
    resources:
      - path: widget-sample.json
    info:
      path: widget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bmithilesh.macfanwidget.widget
        PRODUCT_NAME: Mac Fan Widget Extension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: widget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: NO

schemes:
  MacFanWidgetApp:
    build:
      targets:
        MacFanWidgetApp: all
        MacFanWidgetDaemon: all
        MacFanWidgetExtension: all
